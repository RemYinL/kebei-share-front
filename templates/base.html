<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}多端文件共享 · 科贝智色{% endblock %}</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --surface-active: rgba(255,255,255,0.1);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f4;
    --text-secondary: rgba(255,255,255,0.5);
    --text-muted: rgba(255,255,255,0.25);
    --accent: #7c5cfc;
    --accent-glow: rgba(124,92,252,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --font: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html, body { height: 100%; overflow-x: hidden; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(124,92,252,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(249,115,22,0.04) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(59,130,246,0.03) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .container {
    position: relative; z-index: 1;
    max-width: 1200px; margin: 0 auto; padding: 32px 24px 80px;
  }
  header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 0; margin-bottom: 48px;
  }
  .header-left { display: flex; align-items: center; gap: 16px; }
  .logo-left img { height: 36px; width: auto; opacity: 0.9; }
  .logo-right {
    display: flex; align-items: center; gap: 10px;
    text-decoration: none; color: var(--text);
  }
  .logo-right img { height: 32px; width: auto; border-radius: 6px; }
  .logo-right span {
    font-size: 18px; font-weight: 600; letter-spacing: 2px;
    background: linear-gradient(135deg, #7c5cfc, #f97316);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
  }
  .user-badge {
    display: flex; align-items: center; gap: 8px;
    padding: 6px 14px 6px 10px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 20px; font-size: 0.82rem;
  }
  .role-dot { width: 7px; height: 7px; border-radius: 50%; display: inline-block; }
  .role-dot.admin { background: #7c5cfc; }
  .role-dot.editor { background: #f97316; }
  .role-dot.viewer { background: #34d399; }
  .user-badge .name { font-weight: 500; }
  .user-badge .role-label { color: var(--text-muted); font-size: 0.75rem; }
  .user-badge .link { color: var(--text-secondary); cursor: pointer; margin-left: 6px; }
  .user-badge .link:hover { color: var(--text); }
  .btn {
    padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 0.82rem; font-family: var(--font); cursor: pointer; transition: 0.2s;
    background: transparent; color: var(--text-secondary); text-decoration: none;
    display: inline-flex; align-items: center; gap: 6px;
  }
  .btn:hover { background: var(--surface-hover); color: var(--text); }
  .btn-primary {
    background: linear-gradient(135deg, #7c5cfc, #6a4ce8);
    border: none; color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,92,252,0.3); }
  .btn-danger { border-color: rgba(248,113,113,0.3); color: #f87171; }
  .btn-danger:hover { background: rgba(248,113,113,0.1); }
  .card {
    background: var(--surface);
    backdrop-filter: blur(24px) saturate(1.4);
    -webkit-backdrop-filter: blur(24px) saturate(1.4);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 24px;
    transition: all 0.3s;
  }
  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 0.82rem; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 6px;
  }
  .field input, .field select, .field textarea {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 0.95rem; font-family: var(--font);
    outline: none; transition: 0.25s;
  }
  .field input:focus, .field select:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field input::placeholder { color: var(--text-muted); }
  .field select {
    appearance: none; cursor: pointer;
  }
  .field select option { background: #1a1a24; color: var(--text); }
  .toast {
    position: fixed; top: 24px; left: 50%; transform: translateX(-50%);
    z-index: 999; padding: 12px 24px;
    border-radius: var(--radius-sm); font-size: 0.9rem;
    background: var(--surface); border: 1px solid var(--border);
    backdrop-filter: blur(16px);
    opacity: 0; transition: opacity 0.3s; pointer-events: none;
  }
  .toast.show { opacity: 1; }
  .toast.success { border-color: rgba(52,211,153,0.4); }
  .toast.error { border-color: rgba(248,113,113,0.4); color: #f87171; }
  footer { text-align: center; padding: 40px 0; color: var(--text-muted); font-size: 0.8rem; }
  @media (max-width: 640px) {
    .container { padding: 20px 16px 60px; }
    header { flex-direction: column; gap: 12px; }
  }
</style>
{% block head %}{% endblock %}
</head>
<body>
<div id="toast" class="toast"></div>
<div class="container">
  <header>
    <div class="header-left">
      <a href="/" class="logo-left">
        <img src="/static/logo1.png" alt="Logo">
      </a>
      <div id="userBadge"></div>
    </div>
    <div style="display:flex;align-items:center;gap:8px;">
      <a href="/account" class="btn">账户</a>
      <a href="https://kebeizhise.cn" class="logo-right" target="_blank">
        <img src="/static/logo2.png" alt="科贝智色">
        <span>科贝智色</span>
      </a>
      <button class="btn" onclick="handleLogout()">退出</button>
    </div>
  </header>
  {% block content %}{% endblock %}
  <footer><p>Powered by 科贝智色 &middot; 内部文件共享平台</p></footer>
</div>
<script>
var _user = null;
function checkAuth() {
  var raw = sessionStorage.getItem('kebei_user');
  if (!raw) { window.location.href = '/login'; return null; }
  try { _user = JSON.parse(raw); return _user; } catch(e) { window.location.href = '/login'; return null; }
}
function renderBadge(user) {
  var b = document.getElementById('userBadge');
  if (!b) return;
  var roleLabels = {'admin':'管理员','editor':'编辑者','viewer':'查看者'};
  b.innerHTML = '<span class="user-badge">'
    + '<span class="role-dot ' + user.role + '"></span>'
    + '<span class="name">' + user.name + '</span>'
    + '<span class="role-label">' + (roleLabels[user.role]||user.role) + '</span>'
    + '</span>';
}
function handleLogout() {
  fetch('/api/logout', {method:'POST'}).then(function(){
    sessionStorage.removeItem('kebei_user');
    window.location.href = '/login';
  });
}
function toast(msg, type) {
  var t = document.getElementById('toast');
  t.textContent = msg; t.className = 'toast show ' + (type||'');
  setTimeout(function(){ t.className = 'toast'; }, 3000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
