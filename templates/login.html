<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>登录 · 科贝智色</title>
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Noto+Sans+SC:wght@300;400;500;700&display=swap');
  :root {
    --bg: #0a0a0f;
    --surface: rgba(255,255,255,0.04);
    --surface-hover: rgba(255,255,255,0.07);
    --border: rgba(255,255,255,0.08);
    --border-hover: rgba(255,255,255,0.15);
    --text: #f0f0f4;
    --text-secondary: rgba(255,255,255,0.5);
    --text-muted: rgba(255,255,255,0.25);
    --accent: #7c5cfc;
    --accent-glow: rgba(124,92,252,0.15);
    --radius: 16px;
    --radius-sm: 10px;
    --font: 'Inter', 'Noto Sans SC', -apple-system, BlinkMacSystemFont, sans-serif;
  }
  html, body { height: 100%; overflow: hidden; }
  body {
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    display: flex; align-items: center; justify-content: center;
    position: relative;
  }
  body::before {
    content: '';
    position: fixed;
    top: -50%; left: -50%;
    width: 200%; height: 200%;
    background:
      radial-gradient(ellipse 80% 60% at 20% 20%, rgba(124,92,252,0.08) 0%, transparent 60%),
      radial-gradient(ellipse 60% 50% at 80% 80%, rgba(249,115,22,0.06) 0%, transparent 60%),
      radial-gradient(ellipse 50% 40% at 50% 50%, rgba(59,130,246,0.04) 0%, transparent 50%);
    pointer-events: none; z-index: 0;
  }
  .login-card {
    position: relative; z-index: 1;
    width: 100%; max-width: 420px;
    background: var(--surface);
    backdrop-filter: blur(28px) saturate(1.5);
    -webkit-backdrop-filter: blur(28px) saturate(1.5);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 48px 36px 40px;
    margin: 24px;
  }
  .login-card:hover {
    border-color: var(--border-hover);
    box-shadow: 0 0 0 1px rgba(255,255,255,0.04) inset;
  }
  .login-brand { text-align: center; margin-bottom: 36px; }
  .login-brand h1 {
    font-size: 1.4rem; font-weight: 600;
    background: linear-gradient(135deg, #7c5cfc, #f97316);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    letter-spacing: 1px;
  }
  .login-brand p { font-size: 0.85rem; color: var(--text-secondary); margin-top: 6px; }
  .field { margin-bottom: 20px; }
  .field label {
    display: block; font-size: 0.82rem; font-weight: 500;
    color: var(--text-secondary); margin-bottom: 6px;
  }
  .field input {
    width: 100%; padding: 12px 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    color: var(--text); font-size: 0.95rem; font-family: var(--font);
    outline: none; transition: 0.25s;
  }
  .field input:focus {
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-glow);
  }
  .field input::placeholder { color: var(--text-muted); }
  .btn {
    padding: 8px 18px; border-radius: 20px; border: 1px solid var(--border);
    font-size: 0.82rem; font-family: var(--font); cursor: pointer; transition: 0.2s;
    background: transparent; color: var(--text-secondary); text-decoration: none;
    display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  }
  .btn:hover { background: var(--surface-hover); color: var(--text); }
  .btn-primary {
    background: linear-gradient(135deg, #7c5cfc, #6a4ce8);
    border: none; color: #fff;
  }
  .btn-primary:hover { opacity: 0.88; transform: translateY(-1px); box-shadow: 0 4px 16px rgba(124,92,252,0.3); }
  .error { color: #f87171; font-size: 0.85rem; margin-top: 12px; text-align: center; min-height: 1.4em; }
</style>
</head>
<body>
<div class="login-card">
  <div class="login-brand">
    <h1>科贝智色</h1>
    <p>多端文件共享 · 安全访问</p>
  </div>
  <form onsubmit="return handleLogin(event)">
    <div class="field">
      <label>工号</label>
      <input type="text" id="userId" placeholder="请输入工号" autocomplete="off" required>
    </div>
    <div class="field">
      <label>密码</label>
      <input type="password" id="password" placeholder="请输入密码" required>
    </div>
    <button type="submit" class="btn btn-primary" style="width:100%;padding:12px;border-radius:var(--radius-sm);font-size:0.95rem;">登 录</button>
    <div class="error" id="errorMsg"></div>
  </form>
</div>
<script>
function handleLogin(e) {
  e.preventDefault();
  var id = document.getElementById('userId').value.trim();
  var pw = document.getElementById('password').value;
  var err = document.getElementById('errorMsg');
  fetch('/api/login', {
    method: 'POST',
    headers: {'Content-Type':'application/json'},
    body: JSON.stringify({id:id, password:pw})
  }).then(function(r){ return r.json(); }).then(function(data){
    if (data.success) {
      sessionStorage.setItem('kebei_user', JSON.stringify(data.user));
      if (data.force_change) {
        window.location.href = '/account?tab=password';
      } else {
        window.location.href = '/';
      }
    } else {
      err.textContent = data.message || '登录失败';
    }
  }).catch(function(){
    err.textContent = '网络错误';
  });
  return false;
}
</script>
</body>
</html>
